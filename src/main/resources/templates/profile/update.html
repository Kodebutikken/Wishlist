<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Opdater profil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
</head>
<body>
<nav th:replace="~{fragments/fragments :: navbar}"></nav>

<main class="container">
    <div class="form-container">
        <h1>Opdater profil</h1>
        <form th:action="@{/profile/update}" th:object="${profile}" method="post">
            <div th:if="${error}" class="form-error-container">
                <p th:if="${error}" th:text="${error}"></p>
            </div>
            <div class="form-group">
                <label for="username">Brugernavn:</label>
                <input type="text" id="username" name="username" th:field="*{userName}" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" th:field="*{email}" required>
            </div>
            <div class="form-group">
                <label for="password">Nyt password:</label>
                <input type="password" id="password" name="password">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Bekræft nyt password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword">
            </div>
            <div class="button-row-10 justify-start">
                <button class="btn-link-primary" type="submit">Opdater</button>
                <button class="btn-link-secondary" type="button" onclick="window.history.back()">Annuller</button>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/fragments :: footer}"></footer>
</body>
</html>
