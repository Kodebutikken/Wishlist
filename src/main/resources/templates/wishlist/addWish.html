<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tilføj ønske</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
</head>
<body>
    <main class="form-container">
        <h1>Tilføj et ønske</h1>
        <form th:action="@{/wishlists/{wishlistId}/wish/add(wishlistId=${wishlistId})}" method="post">
            <div class="form-group">
                <label for="name">Gave Navn:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="quantity">Antal:</label>
                <input type="number" id="quantity" name="quantity" min="1" required>
            </div>
            <div class="form-group">
                <label for="price">Pris (DKK):</label>
                <input type="number" id="price" name="price" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="description">Beskrivelse:</label>
                <textarea id="description" name="description"></textarea>
            </div>
            <div class="form-group">
                <label for="url">URL:</label>
                <input type="url" id="url" name="url">
            </div>
            <button type="submit">Tilføj Ønske</button>
        </form>
    </main>

</body>
</html>
