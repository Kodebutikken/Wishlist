<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
</head>
<body>
<nav th:replace="~{fragments/fragments :: navbar}"></nav>
<main class="container">
    <div th:if="${error}" class="error-message" th:text="${error}"></div>
    <div class="form-container">
        <h1>Rediger produkt</h1>
        <form th:action="@{/products/edit/{id}(id=${product.id})}" method="post" class="product-form">
            <div class="form-group">
                <label for="name">Produktnavn:</label>
                <input type="text" id="name" name="name" th:value="${product.name}" required>
            </div>
            <div class="form-group">
                <label for="price">Pris (DKK):</label>
                <input type="number" id="price" name="price" th:value="${product.price}" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="description">Beskrivelse:</label>
                <textarea id="description" name="description" rows="4" th:text="${product.description}"></textarea>
            </div>
            <div class="form-group">
                <label for="productUrl">Produkt URL:</label>
                <input type="url" id="productUrl" name="productUrl" th:value="${product.productUrl}">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-link-primary">Gem ændringer</button>
                <a th:href="@{/products}">
                    <button type="button" class="btn-link-secondary">
                        Annuller
                    </button>
                </a>
                <button th:formaction="@{/products/delete/{id}(id=${product.id})}" type="submit"
                        class="btn-link-destructive delete-button">Slet produkt
                </button>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/fragments :: footer}"></footer>
</body>
</html>
